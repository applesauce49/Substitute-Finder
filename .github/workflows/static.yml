name: Deploy SubAtomic

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: oplm-subatomic-deploy

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            nvm use 22

            RELEASE_DIR=/var/www/subatomic/releases/$(date +%Y%m%d%H%M%S)
            REPO_DIR=~/subatomic

            mkdir -p /var/www/subatomic/releases

            if [ ! -d "$REPO_DIR" ]; then
              git clone https://github.com/YOURORG/subatomic.git $REPO_DIR
            fi

            cd $REPO_DIR
            git pull

            npm install
            npm run build

            mkdir -p $RELEASE_DIR
            cp -r dist/* $RELEASE_DIR/

            ln -sfn $RELEASE_DIR /var/www/subatomic/current

            echo "Deploy complete → $RELEASE_DIR"
